<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Daftar Akun</title>
    <link rel="stylesheet" href="css/sign.css" />
  </head>
  <body>
    <main class="page-bg">
      <div class="card">
        <aside class="hero">
          <img src="/src/wayang_klitik.jpg" alt="Pertunjukan wayang" />
          <div class="hero-overlay">
            <p class="muted">Selamat Datang</p>
            <h2>Akses akun Anda dengan nuansa budaya yang elegan.</h2>
            <p class="muted-sub">Halaman login modern dengan sentuhan warna hangat dan desain responsif.</p>
          </div>
        </aside>

        <section class="panel">
          <header class="panel-header">
            <div class="logo-mark" aria-hidden="true"></div>
          </header>

          <div class="panel-body">
            <div class="tabs">
              <a href="/login" class="tab">LOGIN</a>
              <a href="/register" class="tab active" aria-current="page">SIGN IN</a>
            </div>

            <div class="intro">
              <h1>Selamat Datang</h1>
              <p>Daftar untuk membuat akun baru dan menikmati semua fitur yang tersedia.</p>
            </div>

            <form id="signForm" novalidate>
              <div class="field">
                <label for="name">Nama Lengkap</label>
                <div class="control" id="nameWrap">
                  <span class="icon">👤</span>
                  <input id="name" name="name" type="text" placeholder="Masukan Nama Lengkap" />
                </div>
                <p class="error" id="nameError"></p>
              </div>

              <div class="field">
                <label for="identity">Email / No. Telepon</label>
                <div class="control" id="identityWrap">
                  <span class="icon">👤</span>
                  <input id="identity" name="identity" type="text" placeholder="Masukan Email/No.Telp" />
                </div>
                <p class="error" id="identityError"></p>
              </div>

              <div class="field">
                <label for="password">Password</label>
                <div class="control" id="passwordWrap">
                  <span class="icon">🔒</span>
                  <input id="password" name="password" type="password" placeholder="Password" />
                  <button type="button" id="togglePass" class="toggle">Lihat</button>
                </div>
                <p class="error" id="passwordError"></p>
              </div>

              <div class="row between">
                <a href="#" class="muted-link">Lupa kata sandi?</a>
                <button type="submit" class="btn primary" id="submitBtn">DAFTAR</button>
              </div>

              <div id="status" class="status" aria-live="polite"></div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <script>
      (function () {
        const form = document.getElementById('signForm');
        const nameInput = document.getElementById('name');
        const identity = document.getElementById('identity');
        const password = document.getElementById('password');
        const nameError = document.getElementById('nameError');
        const identityError = document.getElementById('identityError');
        const passwordError = document.getElementById('passwordError');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');
        const toggle = document.getElementById('togglePass');

        function clearErrors() {
          nameError.textContent = '';
          identityError.textContent = '';
          passwordError.textContent = '';
          document.getElementById('nameWrap').classList.remove('error');
          document.getElementById('identityWrap').classList.remove('error');
          document.getElementById('passwordWrap').classList.remove('error');
          status.textContent = '';
          status.className = 'status';
        }

        toggle.addEventListener('click', function () {
          if (password.type === 'password') {
            password.type = 'text';
            toggle.textContent = 'Sembunyikan';
          } else {
            password.type = 'password';
            toggle.textContent = 'Lihat';
          }
        });

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          clearErrors();
          let ok = true;
          const namev = nameInput.value.trim();
          const idv = identity.value.trim();
          const pwd = password.value;

          if (!namev) {
            nameError.textContent = 'Nama lengkap wajib diisi.';
            document.getElementById('nameWrap').classList.add('error');
            ok = false;
          }

          if (!idv) {
            identityError.textContent = 'Email atau nomor telepon wajib diisi.';
            document.getElementById('identityWrap').classList.add('error');
            ok = false;
          }
          if (!pwd || pwd.length < 6) {
            passwordError.textContent = 'Password minimal 6 karakter.';
            document.getElementById('passwordWrap').classList.add('error');
            ok = false;
          }

          if (!ok) {
            status.textContent = 'Silakan periksa kembali data pendaftaran Anda.';
            status.classList.add('status-error');
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = 'MEMPROSES...';

          // AJAX Fetch menuju backend Express untuk Registrasi
          fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: namev, identity: idv, password: pwd })
          })
          .then(res => res.json())
          .then(data => {
            submitBtn.disabled = false;
            submitBtn.textContent = 'DAFTAR';

            if (data.success) {
              status.textContent = data.message + ' Mengalihkan...';
              status.className = 'status status-success';
              form.reset();
              // Otomatis pindah ke halaman login setelah sukses
              setTimeout(() => { window.location.href = '/login'; }, 1500);
            } else {
              status.textContent = data.message;
              status.className = 'status status-error';
            }
          })
          .catch(() => {
            submitBtn.disabled = false;
            submitBtn.textContent = 'DAFTAR';
            status.textContent = 'Terjadi kesalahan koneksi ke server.';
            status.className = 'status status-error';
          });
        });
      })();
    </script>
  </body>
</html>
