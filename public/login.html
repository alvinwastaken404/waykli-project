<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <main class="page-bg">
      <div class="card">
        <aside class="hero">
          <img src="resources/wayang_klitik.jpg" alt="Pertunjukan wayang" />
        </aside>

        <section class="panel">
          <header class="panel-header">
            <nav class="nav">
              <a href="#">Home</a>
              <a href="#">Tentang Kami</a>
              <a href="#">Kontak</a>
            </nav>
            <div class="logo-mark" aria-hidden="true"></div>
          </header>

          <div class="panel-body">
            <div class="tabs">
              <a href="login.html" class="tab active" aria-current="page">LOGIN</a>
              <a href="sign.html" class="tab">SIGN IN</a>
            </div>

            <div class="intro">
              <h1>Selamat Datang</h1>
              <p>Masuk ke akun Anda untuk melanjutkan aktivitas dengan aman dan nyaman.</p>
            </div>

            <form id="loginForm" novalidate>
              <div class="field">
                <label for="identity">Email / No. Telepon</label>
                <div class="control" id="identityWrap">
                  <span class="icon">👤</span>
                  <input id="identity" name="identity" type="text" placeholder="Masukan Email/No.Telp" />
                </div>
                <p class="error" id="identityError"></p>
              </div>

              <div class="field">
                <label for="password">Password</label>
                <div class="control" id="passwordWrap">
                  <span class="icon">🔒</span>
                  <input id="password" name="password" type="password" placeholder="Password" />
                  <button type="button" id="togglePass" class="toggle">Lihat</button>
                </div>
                <p class="error" id="passwordError"></p>
              </div>

              <div class="row between">
                <a href="#" class="muted-link">Lupa kata sandi?</a>
                <button type="submit" class="btn primary" id="submitBtn">LOGIN</button>
              </div>

              <div id="status" class="status" aria-live="polite"></div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <script>
      (function () {
        const form = document.getElementById('loginForm');
        const identity = document.getElementById('identity');
        const password = document.getElementById('password');
        const identityError = document.getElementById('identityError');
        const passwordError = document.getElementById('passwordError');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');
        const toggle = document.getElementById('togglePass');

        function isEmail(v) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
        }

        function isPhone(v) {
          return /^\+?\d{8,15}$/.test(v.replace(/[\s-]/g, ''));
        }

        function clearErrors() {
          identityError.textContent = '';
          passwordError.textContent = '';
          document.getElementById('identityWrap').classList.remove('error');
          document.getElementById('passwordWrap').classList.remove('error');
          status.textContent = '';
          status.className = 'status';
        }

        toggle.addEventListener('click', function () {
          if (password.type === 'password') {
            password.type = 'text';
            toggle.textContent = 'Sembunyikan';
          } else {
            password.type = 'password';
            toggle.textContent = 'Lihat';
          }
        });

        form.addEventListener('submit', function (e) {
          e.preventDefault();
          clearErrors();
          let ok = true;
          const idv = identity.value.trim();
          const pwd = password.value;

          if (!idv) {
            identityError.textContent = 'Email atau nomor telepon wajib diisi.';
            document.getElementById('identityWrap').classList.add('error');
            ok = false;
          } else if (!isEmail(idv) && !isPhone(idv)) {
            identityError.textContent = 'Masukkan email yang valid atau nomor telepon 8-15 digit.';
            document.getElementById('identityWrap').classList.add('error');
            ok = false;
          }

          if (!pwd) {
            passwordError.textContent = 'Password wajib diisi.';
            document.getElementById('passwordWrap').classList.add('error');
            ok = false;
          } else if (pwd.length < 6) {
            passwordError.textContent = 'Password minimal 6 karakter.';
            document.getElementById('passwordWrap').classList.add('error');
            ok = false;
          }

          if (!ok) {
            status.textContent = 'Silakan periksa kembali data login Anda.';
            status.classList.add('status-error');
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = 'MEMPROSES...';

          setTimeout(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = 'LOGIN';
            status.textContent = 'Login berhasil. Selamat datang, ' + idv + '!';
            status.classList.add('status-success');
            form.reset();
          }, 900);
        });
      })();
    </script>
  </body>
</html>
