<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PDF Reader</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            width:100vw;
            height:100vh;
            overflow:hidden;
        }

        iframe{
            width:100%;
            height:100%;
            border:none;
        }
    </style>
</head>
<body>

<iframe id="pdfFrame"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

if(file){
    document.getElementById("pdfFrame").src = file;
}
</script>

</body>
</html>
