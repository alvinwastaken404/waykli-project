<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waykli - Buku Audio</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/perpus.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
        <span class="logo-text">Waykli</span>
      </div>

      <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item" data-page="home">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span class="nav-label">Home</span>
        </a>

        <a href="/perpus" class="nav-item active" data-page="perpustakaan">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          <span class="nav-label">Perpustakaan</span>
        </a>

        <a href="/ujian" class="nav-item" data-page="ujian">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span class="nav-label">Ujian</span>
        </a>

        <div class="nav-divider"></div>

        <a href="/profile" class="nav-item" data-page="profil">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span class="nav-label">Profil User</span>
        </a>
      </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
        <div class="top-bar">
            <div class="search-container">
                <span class="material-icons-outlined search-icon">search</span>
                <input type="text" placeholder="Mencari...">
            </div>
            <button class="filter-btn">
                <span class="material-icons-outlined">tune</span>
            </button>
        </div>

        <div class="content-panel">
            <div class="panel-title">
                <span class="material-icons-outlined">menu_book</span>
                <strong>Buku Audio</strong>
            </div>

            <div class="audio-grid">
            
            <div class="card">
                <div class="card-top">
                        <div class="book-wrapper">
                            <div class="book-orange"></div>
                            <div class="book-blue"></div>
                        </div>
                        <span class="material-icons-outlined audio-icon">volume_up</span>
                    </div>
                    <div class="card-bottom">Kumpulan Geguritan</div>
                </div>

                <div class="card">
                    <div class="card-top">
                        <div class="book-wrapper">
                            <div class="book-orange"></div>
                            <div class="book-blue"></div>
                        </div>
                        <span class="material-icons-outlined audio-icon">volume_up</span>
                    </div>
                    <div class="card-bottom underlined">Lakone Wayang</div>
                </div>

                <div class="card">
                    <div class="card-top">
                        <div class="book-wrapper">
                            <div class="book-orange"></div>
                            <div class="book-blue"></div>
                        </div>
                        <span class="material-icons-outlined audio-icon">volume_up</span>
                    </div>
                    <div class="card-bottom">Pepak Basa Jawa</div>
                </div>

                <div class="card">
                    <div class="card-top">
                        <div class="book-wrapper">
                            <div class="book-orange"></div>
                            <div class="book-blue"></div>
                        </div>
                        <span class="material-icons-outlined audio-icon">volume_up</span>
                    </div>
                    <div class="card-bottom">Tembang Macapat</div>
                </div>

                <div class="card">
                    <div class="card-top">
                        <div class="book-wrapper">
                            <div class="book-orange"></div>
                            <div class="book-blue"></div>
                        </div>
                        <span class="material-icons-outlined audio-icon">volume_up</span>
                    </div>
                    <div class="card-bottom">Cerita Daerah</div>
                </div>

                <div class="card">
                    <div class="card-top">
                        <div class="book-wrapper">
                            <div class="book-orange"></div>
                            <div class="book-blue"></div>
                        </div>
                        <span class="material-icons-outlined audio-icon">volume_up</span>
                    </div>
                    <div class="card-bottom">Wayang Klitik</div>
                </div>

            </div>
        </main>

    <script src="../js/dashboard.js"></script>
    <script src="../js/perpus.js"></script>
</body>
</html>
